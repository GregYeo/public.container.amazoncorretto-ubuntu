name: Publish container image

on:
  push:
    tags:
      - '*'

env:
  COMPOSE_FILE: 'compose.yml:compose.build.yml'

jobs:
  build-and-push-platform:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            platform-tag: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform-tag: linux-arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@v2
        with:
          comment_on_pr: true

      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract repo name
        id: repo_name_step
        run: |
          REPO_LOWERCASE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          echo "repo_name=ghcr.io/$REPO_LOWERCASE" >> $GITHUB_OUTPUT

      - name: Build and Push with Compose
        env:
          REPO_NAME: ${{ steps.repo_name_step.outputs.repo_name }}
          VERSION_TAG: ${{ github.ref_name }} # Uses the Git Tag
          PLATFORM_TAG: ${{ matrix.platform-tag }}
        run: |
          docker compose build
          docker compose push

  create-manifest:
    name: Create Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: build-and-push-platform
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repo name
        id: repo_name_step
        run: |
          REPO_LOWERCASE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
          echo "repo_name=ghcr.io/$REPO_LOWERCASE" >> $GITHUB_OUTPUT

      - name: Create manifest list and push
        env:
          REPO_NAME: ${{ steps.repo_name_step.outputs.repo_name }}
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          SERVICES=$(docker compose config --services)
          
          for SERVICE in $SERVICES; do
            echo "--- Creating Manifest for: $SERVICE ($VERSION_TAG) ---"
          
            AMD64_SOURCE="$REPO_NAME:$SERVICE-$VERSION_TAG-linux-amd64"
            ARM64_SOURCE="$REPO_NAME:$SERVICE-$VERSION_TAG-linux-arm64"
          
            # Create the final multi-arch tag (e.g., ghcr.io/repo:amazoncorretto21-ubuntu24-v0.2.0)
            docker buildx imagetools create \
              -t "$REPO_NAME:$SERVICE-$VERSION_TAG" \
              "$AMD64_SOURCE" \
              "$ARM64_SOURCE"
          done
